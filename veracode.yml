debug: false
default:
  runs_on: ubuntu-latest
veracode_static_scan:
  push:
    trigger: true
    branches_to_run:
      - master
    branches_to_exclude:
      - branch-1
  pull_request:
    trigger: false
    action:
      - opened
      - edited
      - synchronize
      - closed
      - reopened
    target_branch:
      - default_branch
  analysis_on_platform: false
  break_build_policy_findings: false
  break_build_invalid_policy: false
  break_build_on_error: true
  error_message: Veracode static scan faced a problem.
  policy: Veracode Recommended Medium + SCA
  create_code_scanning_alert: false
  create_issue: false
  issues:
    trigger: false
    commands:
      - Veracode SAST Scan
  create_work_items: true
  analysis_branch:
    - js-dynamic
veracode_sca_scan:
  push:
    trigger: false
    branches_to_run:
      - '*'
    branches_to_exclude:
      - branch-1
  pull_request:
    trigger: false
    action:
      - opened
      - edited
      - synchronize
      - closed
      - reopened
    target_branch:
      - default_branch
  break_build_on_error: false
  error_message: Veracode static scan faced a problem.
  issues:
    trigger: false
    commands:
      - Veracode SCA Scan
  fix_for_sca:
    pull_request:
      trigger: true
  break_build_policy_findings: false
  break_build_invalid_policy: false
veracode_iac_secrets_scan:
  push:
    trigger: false
    branches_to_run:
      - '*'
    branches_to_exclude:
      - branch-1
  pull_request:
    trigger: false
    action:
      - opened
      - edited
      - synchronize
      - closed
      - reopened
    target_branch:
      - default_branch
  break_build_policy_findings: false
  break_build_on_error: false
  error_message: Veracode static scan faced a problem.
  issues:
    trigger: false
    commands:
      - Veracode IAC Scan
  branches_to_run:
    - '*'
