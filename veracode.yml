debug: true
default:
  runs_on: ubuntu-latest
veracode_static_scan:
  push:
    trigger: false
    branches_to_run:
      - js-dynamic
    branches_to_exclude: null
  pull_request:
    trigger: true
    action: 
      - opened
      - synchronize
    target_branch:
      - "*"
  analysis_on_platform: true
  break_build_policy_findings: false
  break_build_invalid_policy: true
  break_build_on_error: false
  error_message: >-
    Veracode static scan faced a problem. Please contact your Veracode
    administrator for more information.
  policy: Veracode Recommended Medium + SCA
  create_code_scanning_alert: true
  create_issue: true
  issues:
    trigger: true
    commands:
      - Veracode SAST Scan
  create_work_items: true
veracode_sca_scan:
  push:
    trigger: false
    branches_to_run:
      - js-dynamic
    branches_to_exclude: null
  pull_request:
    trigger: true
    action:
      - opened
      - synchronize
    target_branch:
      - master
  break_build_on_error: true
  error_message: >-
    Veracode SCA scan faced a problem. Please contact your Veracode
    administrator for more information.
  issues:
    trigger: true
    commands:
      - Veracode SCA Scan
  fix_for_sca:
    pull_request:
      trigger: true
veracode_iac_secrets_scan:
  push:
    trigger: false
    branches_to_run:
      - js-dynamic
    branches_to_exclude: null
  pull_request:
    trigger: false
    action: []
    target_branch:
      - master
  break_build_policy_findings: true
  break_build_on_error: true
  error_message: >-
    Veracode IAC secrets scan faced a problem. Please contact your Veracode
    administrator for more information.
  issues:
    trigger: true
    commands:
      - Veracode IAC Scan
